<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroMap AI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <h1>NeuroMap AI</h1>
            <p>Agentic Personal Knowledge & Learning Companion</p>
            
            <form id="auth-form">
                <input type="text" id="name" class="glass-input hidden" placeholder="Full Name">
                <input type="email" id="email" class="glass-input" placeholder="Email Address" required>
                <input type="password" id="password" class="glass-input" placeholder="Password" required>
                
                <button type="submit" class="glass-btn" style="width: 100%;" id="submit-btn">Login</button>
            </form>
            
            <p style="margin-top: 20px;">
                <span id="toggle-text">Don't have an account?</span>
                <a href="#" id="toggle-mode" style="color: var(--primary-color); text-decoration: none;">Sign up</a>
            </p>
            <div id="error-msg" style="color: #EF4444; margin-top: 10px; font-size: 14px;"></div>
        </div>
    </div>
    
    <script src="js/login.js"></script>
</body>
</html>
